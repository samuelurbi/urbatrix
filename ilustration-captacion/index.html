<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lead Sources Card</title>
    <link rel="stylesheet" href="globals.css" />
    <link rel="stylesheet" href="styleguide.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main
      class="frame"
      data-model-id="206:771"
      aria-label="Lead sources overview"
    >
      <section class="div" aria-label="Lead source channels">
        <div class="div-2">
          <button
            class="google-wrapper"
            type="button"
            aria-label="Google lead source"
          >
            <img
              class="img"
              src="https://c.animaapp.com/kTs4BzTk/img/google-1.svg"
              alt="Google"
            />
          </button>
          <img
            class="vector"
            src="https://c.animaapp.com/kTs4BzTk/img/vector-603.svg"
            alt=""
            aria-hidden="true"
          />
        </div>
        <div class="div-3">
          <div class="frame-wrapper">
            <div class="div-wrapper">
              <button
                class="meta-wrapper"
                type="button"
                aria-label="Meta lead source, selected"
              >
                <img
                  class="meta"
                  src="https://c.animaapp.com/kTs4BzTk/img/meta-1.svg"
                  alt="Meta"
                />
              </button>
            </div>
          </div>
          <img
            class="vector"
            src="https://c.animaapp.com/kTs4BzTk/img/vector-608.svg"
            alt=""
            aria-hidden="true"
          />
        </div>
        <div class="div-2">
          <button
            class="tiktok-wrapper"
            type="button"
            aria-label="TikTok lead source"
          >
            <img
              class="img"
              src="https://c.animaapp.com/kTs4BzTk/img/tiktok-1.svg"
              alt="TikTok"
            />
          </button>
          <img
            class="vector"
            src="https://c.animaapp.com/kTs4BzTk/img/vector-603.svg"
            alt=""
            aria-hidden="true"
          />
        </div>
      </section>
      <section class="div-4" aria-label="Lead details panel">
        <div class="div-5">
          <div class="div-6">
            <div class="div-7">
              <div class="div-8">
                <span class="avatar" aria-hidden="true"
                  ><span class="ellipse"></span
                ></span>
                <p class="step-name">Nuevo Lead</p>
              </div>
              <div class="rectangle" aria-hidden="true"></div>
            </div>
            <img
              class="img-2"
              src="https://c.animaapp.com/kTs4BzTk/img/frame-1000002955.svg"
              alt=""
              aria-hidden="true"
            />
            <img
              class="img-2"
              src="https://c.animaapp.com/kTs4BzTk/img/frame-1000002956.svg"
              alt=""
              aria-hidden="true"
            />
          </div>
          <button class="img-3-button" type="button" aria-label="Add new lead">
            <img
              class="img-3"
              src="https://c.animaapp.com/kTs4BzTk/img/frame-1000002958.svg"
              alt=""
              aria-hidden="true"
            />
          </button>
        </div>
        <div class="frame-wrapper-2">
          <article class="div-9" aria-label="Lead summary">
            <div class="div-10" aria-hidden="true">
              <div class="rectangle-2"></div>
              <div class="rectangle-3"></div>
              <div class="rectangle-4"></div>
              <div class="rectangle-5"></div>
            </div>
            <div class="analytics-header-wrapper">
              <button
                class="analytics-header"
                type="button"
                aria-label="Analytics option toggle"
                aria-pressed="true"
              >
                <span class="analytics-divider" aria-hidden="true"></span>
                <span class="analytics-option selected" aria-hidden="true">
                  <span class="ellipse-2"></span>
                </span>
              </button>
            </div>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
