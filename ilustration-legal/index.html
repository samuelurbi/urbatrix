<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Document Cards Illustration</title>
<link rel="stylesheet" href="globals.css" />
<link rel="stylesheet" href="styleguide.css" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<main class="frame" data-model-id="211:1310" aria-label="Document cards illustration">
<section class="div" aria-label="Document stack">
<div class="card-background" aria-hidden="true">
<div class="detail-container">
<div class="detail-line"></div>
<div class="detail-line-2"></div>
</div>
</div>
<section class="div-2" aria-label="Available documents">
<article class="card" tabindex="0" aria-label="Fideicomiso document with translation option">
<div class="icon-and-text">
<div class="icon-container" aria-hidden="true">
<img class="file-line" src="https://c.animaapp.com/IvL4xvGt/img/file-2-line-3.svg" alt="" />
</div>
<div class="card-text-container">
<h2 class="step-name">Fideicomiso</h2>
</div>
</div>
<button class="language-wrapper" type="button" aria-label="Translate Fideicomiso">
<img class="language" src="https://c.animaapp.com/IvL4xvGt/img/language-3.svg" alt="" />
</button>
</article>
<article class="card" tabindex="0" aria-label="Confotur document with translation option">
<div class="icon-and-text">
<div class="icon-container" aria-hidden="true">
<img class="file-line" src="https://c.animaapp.com/IvL4xvGt/img/file-2-line-3.svg" alt="" />
</div>
<div class="card-text-container">
<h2 class="step-name">Confotur</h2>
</div>
</div>
<button class="language-wrapper" type="button" aria-label="Translate Confotur">
<img class="language" src="https://c.animaapp.com/IvL4xvGt/img/language-3.svg" alt="" />
</button>
</article>
<article class="card" tabindex="0" aria-label="Contratos document with translation option">
<div class="icon-and-text">
<div class="icon-container" aria-hidden="true">
<img class="file-line" src="https://c.animaapp.com/IvL4xvGt/img/file-2-line-3.svg" alt="" />
</div>
<div class="card-text-container">
<h2 class="step-name">Contratos</h2>
</div>
</div>
<button class="language-wrapper" type="button" aria-label="Translate Contratos">
<img class="language" src="https://c.animaapp.com/IvL4xvGt/img/language-3.svg" alt="" />
</button>
</article>
</section>
<div class="card-background" aria-hidden="true">
<div class="detail-container">
<div class="detail-line"></div>
<div class="detail-line-2"></div>
</div>
</div>
</section>
<img class="box" src="https://c.animaapp.com/IvL4xvGt/img/box.svg" alt="" aria-hidden="true" />
</main>
</body>
</html>
