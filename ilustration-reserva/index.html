<!DOCTYPE html>
<html lang="es" data-02-neutral-mode="gray" data-01-tokens-mode="light" data-theme-mode="light">
<head>

<link rel="stylesheet" href="globals.css">

</head>
<body>
<main class="frame" data-model-id="211:1180" aria-label="Estado de la reservación">

<div class="div-2">
<div class="detail-line"></div>
<div class="detail-line-2"></div>
</div>
</div>
</article>
<article class="container-2" aria-label="Paso Pago online seleccionado">

<div class="payment-info">
<div class="div-3">

<span class="span" aria-hidden="true">••••</span>
<span class="text-wrapper-2">8888</span>
</p>

</div>
</div>
</article>
<article class="container" aria-label="Paso Tarjeta">

<div class="detail-container" aria-hidden="true">
<div class="div-2">
<div class="detail-line"></div>
<div class="detail-line-2"></div>
</div>
</div>
</article>
</section>
<section class="div-4" aria-label="Estado del proceso">

<div class="decor-line"></div>
<div class="decor-line"></div>
</div>

</div>
</section>
<section class="div-5" aria-label="Resumen de producto y pagos">
<div class="div-6">
<article class="container-4" aria-label="Producto">
<div class="container-wrapper">
<img class="img" src="https://c.animaapp.com/BHNG2MIP/img/container@2x.png" alt="Ícono de Urbatrix CRM" />
</div>
<div class="product-info">
<div class="cloud-drive-item">
<h1 class="step-name-3">Urbatrix CRM</h1>
</div>
<p class="step-name-4">$200.000 USD</p>
</div>
</article>
<div class="ellipse-wrapper" aria-label="Estado activo">
<div class="ellipse"></div>
</div>
</div>
<div class="div-7" aria-label="Detalle de pagos">
<div class="div-8" aria-hidden="true">
<div class="div-9">
<div class="detail-line-3"></div>
<div class="detail-line-4"></div>
</div>
<div class="detail-line-5"></div>
</div>
<article class="div-8" aria-label="Pago de dash arroba email punto com terminado en 4242">
<div class="div-10">
<div class="container-5">
<p class="step-name-5">$10.000</p>
<p class="step-name-6">USD</p>
</div>
<div class="container-6">
<div class="icon" aria-hidden="true"></div>
<p class="step-name-7">dash@email.com</p>
</div>
</div>
<p class="step-name-8">• 4242</p>
</article>
<article class="div-8" aria-label="Pago de tam arroba email punto com terminado en 8866">
<div class="div-10">
<div class="container-5">
<p class="step-name-5">$15.000</p>
<p class="step-name-6">USD</p>
</div>
<div class="container-7">
<div class="icon-2" aria-hidden="true"></div>
<p class="step-name-7">tam@email.com</p>
</div>
</div>
<p class="step-name-8">• 8866</p>
</article>
</div>
</section>
