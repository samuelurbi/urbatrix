<!DOCTYPE html>
<html lang="es">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>Urbatrix features overview</title>
    <link rel="stylesheet" href="globals.css" />
    <link rel="stylesheet" href="styleguide.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main
      class="frame"
      data-model-id="211:1484"
      aria-label="Resumen de funcionalidades de Urbatrix"
    >
      <section class="div" aria-label="Características principales">
        <div class="div-2" aria-label="Funciones del lado izquierdo">
          <article class="frame-wrapper">
            <div class="div-3" role="group" aria-label="Pagos por hito">
              <img
                class="img"
                src="https://c.animaapp.com/b9Z67Jq4/img/get-advice-step-icon-container.svg"
                alt=""
                aria-hidden="true"
              />
              <p class="step-name">Pagos por hito</p>
            </div>
          </article>
          <article class="div-wrapper">
            <div class="div-4" role="group" aria-label="Gestión Leads">
              <img
                class="img"
                src="https://c.animaapp.com/b9Z67Jq4/img/frame-1000002997.svg"
                alt=""
                aria-hidden="true"
              />
              <p class="step-name">Gestión Leads</p>
            </div>
          </article>
          <article class="frame-wrapper">
            <div class="div-5" role="group" aria-label="Gestión">
              <img
                class="img"
                src="https://c.animaapp.com/b9Z67Jq4/img/code-step-icon-container.svg"
                alt=""
                aria-hidden="true"
              />
              <p class="step-name">Gestión</p>
            </div>
          </article>
        </div>
        <div class="badge-connectors badge-connectors-left" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </section>
      <section
        class="center-container"
        aria-label="Tarjeta central de Urbatrix"
      >
        <div class="div-6">
          <figure
            class="container"
            aria-label="Vista previa visual de la aplicación"
          >
            <img
              class="element"
              src="https://c.animaapp.com/b9Z67Jq4/img/3-3@2x.png"
              alt="Vista previa de la interfaz de Urbatrix"
            />
            <div class="element-2" aria-hidden="true"></div>
          </figure>
          <div class="div-7" aria-hidden="true">
            <div class="center-rounded"></div>
            <div class="center-rounded-2"></div>
            <div class="center-rounded-2"></div>
          </div>
          <div class="step-name-wrapper" role="img" aria-label="Urbatrix">
            <span class="text-wrapper">URBATRIX</span>
          </div>
        </div>
      </section>
      <section class="div-8" aria-label="Funciones complementarias">
        <div class="badge-connectors badge-connectors-right" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="div-9" aria-label="Funciones del lado derecho">
          <article class="frame-wrapper">
            <div class="div-3" role="group" aria-label="Avance de obra">
              <img
                class="img"
                src="https://c.animaapp.com/b9Z67Jq4/img/create-plan-step-icon-container.svg"
                alt=""
                aria-hidden="true"
              />
              <p class="step-name">Avance de obra</p>
            </div>
          </article>
          <article class="frame-wrapper-2">
            <div class="div-5" role="group" aria-label="Comunicación">
              <img
                class="img"
                src="https://c.animaapp.com/b9Z67Jq4/img/summarize-step-icon-container.svg"
                alt=""
                aria-hidden="true"
              />
              <p class="step-name">Comunicación</p>
            </div>
          </article>
          <article class="frame-wrapper">
            <div class="div-5" role="group" aria-label="Analiticas">
              <img
                class="img"
                src="https://c.animaapp.com/b9Z67Jq4/img/analyze-step-icon-container.svg"
                alt=""
                aria-hidden="true"
              />
              <p class="step-name">Analiticas</p>
            </div>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
